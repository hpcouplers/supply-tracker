<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Cost Tracker — Mid-States Industrial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0e;
  --surface: #1a1a18;
  --surface2: #222220;
  --surface3: #2a2a28;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede6;
  --text2: #b0ada6;
  --muted: #888780;
  --sd: #4fa3e0;
  --psbm: #e07a40;
  --sd-dim: rgba(79,163,224,0.12);
  --psbm-dim: rgba(224,122,64,0.12);
  --green: #5db87a;
  --red: #e05555;
  --accent: #c8b97a;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

body.light {
  --bg: #f4f2ed;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --surface3: #e8e5de;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a18;
  --text2: #444440;
  --muted: #888780;
  --sd-dim: rgba(79,163,224,0.1);
  --psbm-dim: rgba(224,122,64,0.1);
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  transition: background 0.25s, color 0.25s;
}

/* ── HEADER ── */
header {
  border-bottom: 1px solid var(--border);
  padding: 22px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-titles h1 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}
.header-titles p {
  font-size: 11px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-top: 3px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.supplier-legend {
  display: flex;
  gap: 16px;
  align-items: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
}
.legend-dot { width:9px; height:9px; border-radius:50%; }
.legend-sq  { width:9px; height:9px; border-radius:2px; }

/* ── THEME TOGGLE ── */
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}
.toggle-track {
  width: 36px; height: 20px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  position: relative;
  cursor: pointer;
}
.toggle-thumb {
  width: 14px; height: 14px;
  background: var(--muted);
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
  transition: transform 0.2s, background 0.2s;
}
body.light .toggle-thumb {
  transform: translateX(16px);
  background: var(--accent);
}

/* ── ADD BUTTON ── */
.add-btn {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.add-btn:hover {
  background: var(--surface3);
  border-color: rgba(200,185,122,0.4);
  color: var(--accent);
}

/* ── MAIN ── */
main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 28px 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow);
}
.modal h2 {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}
.modal p {
  font-size: 12px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 22px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field.full { grid-column: 1 / -1; }
.form-field label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}
.form-field input,
.form-field select {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.form-field input:focus,
.form-field select:focus { border-color: var(--accent); }
.form-field input[readonly] { opacity: 0.6; cursor: default; }
.form-field select option { background: var(--surface2); }

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.btn-cancel {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 9px 18px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
}
.btn-cancel:hover { color: var(--text); }
.btn-save {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 9px 18px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #1a1a18;
  cursor: pointer;
  font-weight: 600;
}
.btn-save:hover { opacity: 0.88; }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
.save-status {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-right: auto;
  align-self: center;
}
.save-status.success { color: var(--green); }
.save-status.error   { color: var(--red); }

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr {
  background: var(--surface2);
  border-bottom: 1px solid var(--border2);
}
thead th {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 10px 16px;
  text-align: left;
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
tbody td {
  padding: 9px 16px;
  font-family: 'DM Mono', monospace;
  color: var(--text2);
  white-space: nowrap;
}
.sup-badge {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
}
.sup-badge.sd   { background: var(--sd-dim);   color: var(--sd); }
.sup-badge.psbm { background: var(--psbm-dim); color: var(--psbm); }

.del-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 5px;
  border: 1px solid rgba(220,60,60,0.3);
  background: transparent;
  color: var(--red);
  cursor: pointer;
  transition: all 0.15s;
}
.del-btn:hover { background: rgba(220,60,60,0.1); }

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

footer {
  border-top: 1px solid var(--border);
  padding: 18px 40px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
}
</style>
</head>
<body>

<!-- Add Order Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add New Order</h2>
    <p>Data saves directly to Supabase.</p>
    <div class="form-grid">
      <div class="form-field">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-field">
        <label>Supplier</label>
        <select id="f-supplier"></select>
      </div>
      <div class="form-field">
        <label>Order #</label>
        <input type="text" id="f-order" placeholder="e.g. 30422">
      </div>
      <div class="form-field">
        <label>Item</label>
        <select id="f-item" onchange="updatePackSizes()">
          <option value="">-- select --</option>
          <option>Tape</option>
          <option>PB000</option>
          <option>PB00</option>
          <option>PB0</option>
          <option>PB2</option>
          <option>PB3</option>
          <option>PB4</option>
          <option>PB5</option>
        </select>
      </div>
      <div class="form-field">
        <label>Pack Size</label>
        <select id="f-pack" onchange="calcUnit()">
          <option>-- select item first --</option>
        </select>
      </div>
      <div class="form-field">
        <label>Total Price ($)</label>
        <input type="number" id="f-total" step="0.01" placeholder="0.00" oninput="calcUnit()">
      </div>
      <div class="form-field full">
        <label>Unit Cost ($) — auto calculated</label>
        <input type="number" id="f-unit" step="0.001" readonly>
      </div>
    </div>
    <div class="modal-actions">
      <span class="save-status" id="save-status"></span>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveOrder()">Save Order</button>
    </div>
  </div>
</div>

<header>
  <div class="header-left">
    <div class="header-titles">
      <h1>Supply Cost Tracker</h1>
      <p>Mid-States Industrial Sales</p>
    </div>
  </div>
  <div class="header-right">
    <div class="supplier-legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--sd)"></div>
        Shipping Depot
      </div>
      <div class="legend-item">
        <div class="legend-sq" style="background:var(--psbm)"></div>
        PSBM
      </div>
    </div>
    <button class="add-btn" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
      </svg>
      Add Order
    </button>
    <div class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-label">Light</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</header>

<main>
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Loading...</span>
  </div>

  <div class="section-label">Order History</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th><th>Supplier</th><th>Order #</th>
          <th>Item</th><th>Pack</th><th>Total</th><th>Unit Cost</th><th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<footer>
  <span id="footer-count"></span>
  <span id="footer-date"></span>
</footer>

<script>
const SUPABASE_URL = 'https://vsntiuhoxokxyynskood.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzbnRpdWhveG9reHl5bnNrb29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTEwNDcsImV4cCI6MjA5MDc2NzA0N30.ooUQM-dydJtRpynEif5D9ZYRDmp1G6b42rkZV_vG7x8';
const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

let packSizesData = [];
let allOrders = [];

// ── THEME ──
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-label').textContent = isLight ? 'Dark' : 'Light';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('theme-label').textContent = 'Dark';
}

// ── STATUS ──
function setStatus(msg, err) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-dot').style.background = err ? 'var(--red)' : 'var(--green)';
}

// ── DROPDOWNS ──
async function loadDropdowns() {
  const supRes = await fetch(`${SUPABASE_URL}/rest/v1/suppliers?select=*&order=sort_order.asc`, { headers: HEADERS });
  const suppliers = await supRes.json();
  document.getElementById('f-supplier').innerHTML = suppliers.map(s =>
    `<option value="${s.name}">${s.name}</option>`
  ).join('');

  const packRes = await fetch(`${SUPABASE_URL}/rest/v1/pack_sizes?select=*&order=sort_order.asc`, { headers: HEADERS });
  packSizesData = await packRes.json();
}

function updatePackSizes() {
  const item = document.getElementById('f-item').value;
  const packSelect = document.getElementById('f-pack');
  const sizes = packSizesData.filter(p => p.item === item);
  packSelect.innerHTML = sizes.length > 0
    ? sizes.map(p => `<option value="${p.pack}">${p.pack}</option>`).join('')
    : '<option>-- select item first --</option>';
  calcUnit();
}

function calcUnit() {
  const pack = document.getElementById('f-pack').value;
  const total = parseFloat(document.getElementById('f-total').value);
  const match = pack.match(/(\d+(\.\d+)?)/);
  if (match && !isNaN(total) && total > 0) {
    document.getElementById('f-unit').value = (total / parseFloat(match[1])).toFixed(3);
  }
}

// ── LOAD ORDERS ──
async function loadOrders() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/supply_orders?select=*&order=date.asc`, { headers: HEADERS });
    allOrders = await res.json();
    renderTable();
    setStatus(`Connected · ${allOrders.length} orders`);
    document.getElementById('footer-count').textContent = `${allOrders.length} orders`;
    if (allOrders.length > 0) {
      const dates = allOrders.map(o => o.date).sort();
      document.getElementById('footer-date').textContent = `Latest: ${fmtDate(dates[dates.length-1])}`;
    }
  } catch(e) {
    setStatus('Connection failed', true);
  }
}

function fmtDate(d) {
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const sorted = [...allOrders].sort((a,b) => b.date.localeCompare(a.date));
  tbody.innerHTML = sorted.map(r => {
    const isSd = r.supplier === 'Shipping Depot';
    return `<tr>
      <td>${fmtDate(r.date)}</td>
      <td><span class="sup-badge ${isSd ? 'sd' : 'psbm'}">${r.supplier}</span></td>
      <td>${r.order_num}</td>
      <td style="font-weight:600;color:var(--text)">${r.item}</td>
      <td>${r.pack}</td>
      <td>$${parseFloat(r.total).toFixed(2)}</td>
      <td style="color:${isSd ? 'var(--sd)' : 'var(--psbm)'};font-weight:600">$${parseFloat(r.unit).toFixed(3)}</td>
      <td><button class="del-btn" onclick="deleteOrder(${r.id})">delete</button></td>
    </tr>`;
  }).join('');
}

// ── MODAL ──
function openModal() {
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-order').value = '';
  document.getElementById('f-item').value = '';
  document.getElementById('f-pack').innerHTML = '<option>-- select item first --</option>';
  document.getElementById('f-total').value = '';
  document.getElementById('f-unit').value = '';
  document.getElementById('save-status').textContent = '';
  document.getElementById('save-btn').disabled = false;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── SAVE ORDER ──
async function saveOrder() {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  const order = {
    date:      document.getElementById('f-date').value,
    supplier:  document.getElementById('f-supplier').value,
    order_num: document.getElementById('f-order').value.trim(),
    item:      document.getElementById('f-item').value,
    pack:      document.getElementById('f-pack').value,
    total:     parseFloat(document.getElementById('f-total').value),
    unit:      parseFloat(document.getElementById('f-unit').value),
  };

  if (!order.date || !order.order_num || !order.item || isNaN(order.total) || isNaN(order.unit)) {
    status.textContent = 'Please fill in all fields.';
    status.className = 'save-status error';
    return;
  }

  btn.disabled = true;
  status.textContent = 'Saving...';
  status.className = 'save-status';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/supply_orders`, {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify(order)
    });
    if (res.ok) {
      status.textContent = '✓ Saved!';
      status.className = 'save-status success';
      await loadOrders();
      setTimeout(closeModal, 1000);
    } else {
      const err = await res.json();
      status.textContent = 'Error: ' + JSON.stringify(err);
      status.className = 'save-status error';
      btn.disabled = false;
    }
  } catch(e) {
    status.textContent = 'Failed: ' + e.message;
    status.className = 'save-status error';
    btn.disabled = false;
  }
}

// ── DELETE ──
async function deleteOrder(id) {
  if (!confirm('Delete this row?')) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/supply_orders?id=eq.${id}`, {
      method: 'DELETE',
      headers: HEADERS
    });
    if (res.ok) {
      await loadOrders();
    }
  } catch(e) {
    alert('Delete failed: ' + e.message);
  }
}

// ── INIT ──
async function init() {
  await Promise.all([loadDropdowns(), loadOrders()]);
}
init();
</script>
</body>
</html>
